<!DOCTYPE html>
<html>
<head>
<title>Xqare Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
}

/* Responsive container */
.iframe-container {
    width: 100%;
    height: 100vh;
}

/* iframe responsive */
.iframe-container iframe {
    border: none;
    width: 100%;
    height: 100%;
    display: block;
}

/* Tablet adjustments */
@media (max-width: 1024px) {
    .iframe-container {
        height: 100vh;
    }
}

/* Mobile adjustments */
@media (max-width: 768px) {
    .iframe-container {
        height: 100vh;
    }
}
</style>

</head>

<body>

<div class="iframe-container">
    <iframe src="https://xqare.azurewebsites.net/"></iframe>
</div>

</body>
</html>
