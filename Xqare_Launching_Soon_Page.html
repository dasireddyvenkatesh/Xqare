<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
background:linear-gradient(-45deg,#6a11cb,#2575fc,#ff4b2b,#ff416c);
background-size:400% 400%;
animation:gradient 15s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Floating shapes */

.shape{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
animation:float 8s infinite ease-in-out;
}

.shape1{
width:220px;
height:220px;
top:10%;
left:10%;
}

.shape2{
width:180px;
height:180px;
bottom:15%;
right:12%;
animation-delay:2s;
}

.shape3{
width:140px;
height:140px;
bottom:25%;
left:20%;
animation-delay:4s;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-30px)}
}

/* Glass card */

.container{
text-align:center;
padding:60px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 25px 60px rgba(0,0,0,0.3);
max-width:800px;
width:90%;
}

.logo{
font-size:26px;
font-weight:600;
letter-spacing:3px;
margin-bottom:10px;
}

h1{
font-size:56px;
margin-bottom:10px;
background:linear-gradient(45deg,#fff,#ddd);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
opacity:0.85;
margin-bottom:40px;
}

/* Countdown */

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
flex-wrap:wrap;
}

.time{
background:rgba(255,255,255,0.15);
border-radius:15px;
padding:20px 25px;
min-width:100px;
backdrop-filter:blur(10px);
transition:0.3s;
}

.time:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.25);
}

.time h2{
font-size:32px;
margin-bottom:5px;
}

.time span{
font-size:13px;
opacity:0.8;
}

/* Subscribe */

.subscribe{
display:flex;
justify-content:center;
margin-bottom:30px;
}

.subscribe input{
padding:15px;
width:260px;
border:none;
outline:none;
border-radius:30px 0 0 30px;
}

.subscribe button{
padding:15px 25px;
border:none;
background:#ff7a18;
color:white;
font-weight:600;
border-radius:0 30px 30px 0;
cursor:pointer;
transition:0.3s;
}

.subscribe button:hover{
background:#ff5200;
}

/* Social */

.social{
margin-top:20px;
}

.social a{
color:white;
text-decoration:none;
margin:0 10px;
font-size:14px;
opacity:0.8;
transition:0.3s;
}

.social a:hover{
opacity:1;
}

footer{
margin-top:35px;
font-size:13px;
opacity:0.6;
}

/* Responsive */

@media(max-width:600px){

h1{
font-size:40px;
}

.container{
padding:40px 25px;
}

.subscribe{
flex-direction:column;
gap:10px;
}

.subscribe input{
border-radius:30px;
width:100%;
}

.subscribe button{
border-radius:30px;
}

}

</style>

</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<div class="container">

<div class="logo">XQARE</div>

<h1>Coming Soon</h1>

<p class="subtitle">
We are building something amazing. Stay tuned for the launch.
</p>

<div class="countdown">

<div class="time">
<h2 id="days">00</h2>
<span>Days</span>
</div>

<div class="time">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>

<div class="time">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>

<div class="time">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>

</div>

<div class="social">
<a href="#">Twitter</a>
<a href="#">Instagram</a>
<a href="https://www.linkedin.com/company/xqare/about/">LinkedIn</a>
<a href="#">Facebook</a>
</div>

<footer>
© 2026 XQARE. All Rights Reserved
</footer>

</div>

<script>

const launchDate = new Date("March 26, 2026 00:00:00").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
const seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if(distance < 0){
clearInterval(timer);
document.querySelector(".countdown").innerHTML="🚀 We Are Live!";
}

},1000);

</script>

</body>
</html>
